{% extends "base.html" %}

{% block title %}Habits — health_app{% endblock %}

{% block content %}
<h1>Habits</h1>

<div id="habits-content">
    {% include "_habits_list.html" %}
</div>

<section class="block" style="margin-top:24px;">
    <h2>Add habit</h2>
    <form hx-post="/habits"
          hx-target="#habits-content"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) this.reset()"
          x-data="{type: 'binary'}"
          class="habit-form">
        <label>
            Pillar
            <select name="pillar" required>
                {% for p in pillars %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
            </select>
        </label>
        <label>
            Name
            <input type="text" name="name" required maxlength="120">
        </label>
        <label>
            Type
            <select name="type" x-model="type" required>
                <option value="binary">binary (yes/no)</option>
                <option value="time">time (target time of day)</option>
                <option value="quantity">quantity (bucketed)</option>
            </select>
        </label>

        <div x-show="type === 'time'" x-cloak>
            <label>
                Target time
                <input type="time" name="target">
            </label>
            <label>
                Direction
                <select name="direction">
                    <option value="before">before target (e.g. "in bed by ...")</option>
                    <option value="after">after target (e.g. "wake up after ...")</option>
                </select>
            </label>
        </div>

        <div x-show="type === 'quantity'" x-cloak>
            <label>
                Bucket labels (comma-separated, ascending)
                <input type="text" name="bucket_labels" placeholder="&lt;5k, 5-7k, 7-10k, 10-15k, 15k+">
            </label>
            <label>
                Done from bucket index (0-based)
                <input type="number" name="min_done_bucket" min="0" value="2">
            </label>
        </div>

        <button type="submit" class="primary">Add habit</button>
    </form>
</section>
{% endblock %}
